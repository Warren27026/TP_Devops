<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevOps Mini Dashboard</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="container">
    <h1>DevOps Mini Dashboard</h1>
    <p class="subtitle">Projet statique HTML/CSS/JS + Docker + CI/CD + GitHub Pages</p>
</header>
  <main class="container grid">
    <section class="card">
      <h2>📝 Tâches</h2>
      <form id="taskForm" class="row">
        <input id="taskInput" type="text" placeholder="Ajouter une tâche..." maxlength="80" required />
        <button class="btn" type="submit">Ajouter</button>
      </form>
      <ul id="taskList" class="list"></ul>

      <div class="stats">
        <span>Total : <strong id="totalCount">0</strong></span>
        <span>Faites : <strong id="doneCount">0</strong></span>
      </div>
    </section>
      <section class="card">
      <h2>📊 Progression</h2>
      <p class="muted">Graphique simple basé sur le % de tâches terminées.</p>
      <canvas id="progressCanvas" width="420" height="220" aria-label="progress chart"></canvas>
    </section>
    </main>
  <script src="assets/js/app.js"></script>
</body>
</html>
