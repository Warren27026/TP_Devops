name: CI/CD Static Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f index.html
          test -f Dockerfile
          test -d assets
          echo " Project structure OK"

      - name: Build Docker image
        run: |
          docker build -t devops-static-site:ci .

      - name: Simulated deploy command
        run: echo "Deploy could be: docker push ... && docker run ..."

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: github-pages
      url: "${{ steps.deployment.outputs.page_url }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4